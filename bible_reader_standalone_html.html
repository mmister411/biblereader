function openCharactersModal(){if(!state.currentCharacterMatches.length)return openInfoModal("Characters",els.title.textContent,detailCard("Status","No character matches found for this chapter.",true));const html=state.currentCharacterMatches.map(c=>'<div class="detail-card full"><h4>'+escapeHtml(c.name_modern||c.name||"Unknown")+'</h4><div class="character-subtitle">'+escapeHtml([c.name_hebrew,c.name_greek,c.testament].filter(Boolean).join(" • "))+'</div><p><strong>Mentions In Chapter:</strong> '+escapeHtml(String(c.mentionCount||0))+'</p><p><strong>Chapter Verse Refs:</strong> '+emptyToDash((c.chapterRefs||[]).slice(0,10).join(", "))+'</p><p><strong>Meaning:</strong> '+emptyToDash(c.name_meaning)+'</p><p><strong>Role:</strong> '+emptyToDash(c.major_role_in_bible)+'</p><p><strong>Overview:</strong> '+emptyToDash(c.overview_statement||c.summary)+'</p><p><strong>Chapter-Relevant Events:</strong> '+emptyToDash(c.character_main_events||c.key_events)+'</p><p><strong>Key Verses:</strong> '+emptyToDash(c.key_verses||c.primary_scripture_refs)+'</p></div>').join("");openInfoModal("Characters",els.title.textContent,html)}
function openLocationsModal(){if(!state.currentLocationMatches.length)return openInfoModal("Locations",els.title.textContent,detailCard("Status","No location matches found for this chapter.",true));const cards=state.currentLocationMatches.map(l=>'<div class="detail-card full"><h4>'+escapeHtml(l.Name||"Unknown")+'</h4><p><strong>Mentions In Chapter:</strong> '+escapeHtml(String(l.mentionCount||0))+'</p><p><strong>Chapter Verse Refs:</strong> '+emptyToDash((l.chapterRefs||[]).slice(0,10).join(", "))+'</p><p><strong>Geometry:</strong> '+emptyToDash(l.point?l.point.kind+" lon="+l.point.lon+", lat="+l.point.lat:String(l.geometry||"").slice(0,180))+'</p><p><strong>Description:</strong> '+emptyToDash(l.description)+'</p></div>').join("");openInfoModal("Locations",els.title.textContent,renderMiniMap(state.currentLocationMatches)+cards)}
async function openXrefModal(ref){const version=selectedVersion();els.xrefModal.hidden=false;els.xrefModalTitle.textContent=ref+" cross references";els.xrefModalSubtitle.textContent="Loading top weighted references...";els.xrefContent.innerHTML='<div class="status">Loading...</div>';els.xrefFilterChips.innerHTML="";try{const raw=await loadXrefsForVerse(ref);const meta=await loadXrefVerseMetadata(raw);const enriched=raw.map(r=>{const m=meta.get(r.target_VerseRef)||{};return Object.assign({},r,{RankVerse:m.RankVerse,targetRowNum:m.RowNum,Section:m.Section,Subsection:m.Subsection})});const xrefs=sortAndLimitXrefs(ref,enriched);state.currentXrefs=xrefs;state.currentXrefFilter={field:null,value:null};state.currentXrefPassageMap=new Map();renderXrefFilterChips(xrefs);if(!xrefs.length){els.xrefModalSubtitle.textContent="No weighted cross references found.";els.xrefContent.innerHTML='<div class="status">No cross references found for '+escapeHtml(ref)+'.</div>';return}els.xrefModalSubtitle.textContent="Top "+xrefs.length+" weighted references outside this chapter";els.xrefContent.innerHTML=renderXrefs(filteredCurrentXrefs(),new Map(),false);if(version){try{const pm=await loadXrefPassages(xrefs,version.pk);state.currentXrefPassageMap=pm;els.xrefContent.innerHTML=renderXrefs(filteredCurrentXrefs(),pm,true)}catch(e){els.xrefContent.innerHTML='<div class="error">Cross references loaded, but target verse text could not be loaded: '+escapeHtml(e.message||e)+'</div>'+renderXrefs(filteredCurrentXrefs(),new Map(),false)}}}catch(e){els.xrefModalSubtitle.textContent="Could not load cross references.";els.xrefContent.innerHTML='<div class="error">'+escapeHtml(e.message||e)+'</div>'}}
async function loadXrefsForVerse(ref){const limits=[250,100,50,20];let last=null;for(const limit of limits){try{return await apiGet("bible_xrefs",{select:"target_VerseRef,terms,weight,connectid",source_VerseRef:"eq."+ref,limit:String(limit)})}catch(e){last=e;const m=String(e&&e.message?e.message:e);if(m.indexOf("57014")===-1&&m.toLowerCase().indexOf("timeout")===-1)throw e}}throw last||new Error("Could not load cross references.")}
async function loadXrefVerseMetadata(xrefs){const refs=xrefs.map(r=>r.target_VerseRef).filter(Boolean);const map=new Map();if(!refs.length)return map;const rows=await apiGet("bible_verses",{select:"VerseRef,RowNum,RankVerse,Section,Subsection",VerseRef:postgrestTextIn(refs)});rows.forEach(r=>map.set(r.VerseRef,r));return map}function topWeightedXrefsBeforeSort(src,xrefs){return xrefs.filter(r=>!isSameBookChapter(src,r.target_VerseRef)).sort((a,b)=>Number(b.weight||0)-Number(a.weight||0)).slice(0,TOP_XREF_LIMIT)}function sortXrefsForDisplay(xrefs){return xrefs.slice().sort((a,b)=>(Number(a[state.xrefSortMode]||0)-Number(b[state.xrefSortMode]||0))*(state.xrefSortDirection==="asc"?1:-1))}function sortAndLimitXrefs(src,xrefs){return sortXrefsForDisplay(topWeightedXrefsBeforeSort(src,xrefs))}
async function loadXrefPassages(xrefs,versionPk){const refs=Array.from(new Set(xrefs.map(r=>String(r.target_VerseRef||"").trim()).filter(Boolean)));const map=new Map();if(!refs.length)return map;const chunks=[];for(let i=0;i<refs.length;i+=25)chunks.push(refs.slice(i,i+25));const results=await Promise.all(chunks.map(c=>apiGet("bible_passages",{select:"VerseRef,Passage",bible_version_FK:"eq."+versionPk,VerseRef:postgrestTextIn(c)})));results.flat().forEach(r=>{if(r&&r.VerseRef&&r.Passage)map.set(String(r.VerseRef).trim(),r.Passage)});return map}function filteredCurrentXrefs(){if(!state.currentXrefFilter.field)return state.currentXrefs;return state.currentXrefs.filter(r=>String(r[state.currentXrefFilter.field]||"").trim()===state.currentXrefFilter.value)}function renderXrefFilterChips(xrefs){const sections=uniqueSortedValues(xrefs,"Section"),subs=uniqueSortedValues(xrefs,"Subsection");const chips=['<button class="filter-chip'+(!state.currentXrefFilter.field?' active':'')+'" type="button" data-xref-filter-field="" data-xref-filter-value="">All</button>'];sections.forEach(v=>chips.push('<button class="filter-chip'+(state.currentXrefFilter.field==="Section"&&state.currentXrefFilter.value===v?' active':'')+'" type="button" data-xref-filter-field="Section" data-xref-filter-value="'+escapeHtml(v)+'">Section: '+escapeHtml(v)+'</button>'));subs.forEach(v=>chips.push('<button class="filter-chip'+(state.currentXrefFilter.field==="Subsection"&&state.currentXrefFilter.value===v?' active':'')+'" type="button" data-xref-filter-field="Subsection" data-xref-filter-value="'+escapeHtml(v)+'">Subsection: '+escapeHtml(v)+'</button>'));els.xrefFilterChips.innerHTML=chips.join("")}function renderXrefs(xrefs,passageMap,attempted){return sortXrefsForDisplay(xrefs).map((row,i)=>{const ref=row.target_VerseRef||"Unknown reference";const passage=passageMap.get(String(ref).trim())||(attempted?"Passage text not available in the selected version.":"");const weight=row.weight==null?"":"Weight: "+Number(row.weight).toFixed(3);const rank=row.RankVerse==null?"":" • RankVerse: "+Number(row.RankVerse).toFixed(4);const terms=row.terms?'<div class="meta">'+escapeHtml(row.terms)+'</div>':"";const section=row.Section?'<button class="xref-tag" type="button" data-xref-filter-field="Section" data-xref-filter-value="'+escapeHtml(row.Section)+'">Section: '+escapeHtml(row.Section)+'</button>':"";const sub=row.Subsection?'<button class="xref-tag" type="button" data-xref-filter-field="Subsection" data-xref-filter-value="'+escapeHtml(row.Subsection)+'">Subsection: '+escapeHtml(row.Subsection)+'</button>':"";return '<div class="xref-item"><div class="xref-topline"><span><span class="xref-ref">'+(i+1)+'. '+escapeHtml(ref)+'</span></span><span>'+escapeHtml(weight+rank)+'</span></div>'+(passage?'<div class="xref-text">'+escapeHtml(passage)+'</div>':"")+(section||sub?'<div class="xref-tags">'+section+sub+'</div>':"")+terms+'</div>'}).join("")}
function renderVerses(){const q=els.search.value.trim();const filtered=q?state.currentVerses.filter(r=>String(r.Passage||"").toLowerCase().indexOf(q.toLowerCase())!==-1):state.currentVerses;els.passage.innerHTML=filtered.map(r=>{const num=verseNumberFromRef(r.VerseRef);const safe=escapeHtml(r.VerseRef);return '<div class="verse" data-ref="'+safe+'"><div class="verse-actions"><button class="xref-button" type="button" data-xref-ref="'+safe+'">Xrefs</button></div><div class="verse-num"><button class="verse-num-button" type="button" data-verse-detail-ref="'+safe+'">'+escapeHtml(num)+'</button></div><div class="verse-text"><span>'+highlight(r.Passage,q)+'</span></div></div>'}).join("");els.meta.textContent=q?filtered.length+" of "+state.currentVerses.length+" verses shown.":state.currentVerses.length+" verses loaded."}
async function loadChapter(){const version=selectedVersion(),book=selectedBook(),chapter=Number(els.chapter.value);if(!version||!book||!chapter)return;setError(null);setMessage("Loading chapter...");setLoading(true);els.passage.innerHTML="";state.currentVerses=[];state.currentVerseMetaMap=new Map();state.currentCharacterMatches=[];state.currentBookInfo=null;els.bookInfo.disabled=true;els.characters.disabled=true;els.locations.disabled=true;try{const prefix=book.Book_Name+" "+chapter+":";let rows=await apiGet("bible_passages",{select:"VerseRef,Passage,RowNum",bible_version_FK:"eq."+version.pk,VerseRef:"like."+prefix+"%",order:"RowNum.asc"});if(!rows.length){const verseRows=await apiGet("bible_verses",{select:"VerseRef,RowNum",Book_Name:"eq."+book.Book_Name,Chapter:"eq."+chapter,order:"RowNum.asc"});if(!verseRows.length)throw new Error("No verse metadata found for "+book.Book_Name+" "+chapter+".");const nums=verseRows.map(r=>Number(r.RowNum)).filter(Number.isFinite);const min=Math.min.apply(null,nums),max=Math.max.apply(null,nums);rows=await apiGet("bible_passages",{select:"VerseRef,Passage,RowNum",bible_version_FK:"eq."+version.pk,RowNum:"gte."+min,order:"RowNum.asc"});rows=rows.filter(r=>Number(r.RowNum)<=max)}if(!rows.length)throw new Error("No verses found for "+book.Book_Name+" "+chapter+" in "+version.abbreviation+".");state.currentVerses=rows;els.title.textContent=book.Book_Name+" "+chapter;els.subtitle.textContent=(version.abbreviation||"Version")+(version.full_name?" — "+version.full_name:"");els.search.disabled=false;els.clearSearch.disabled=false;els.search.value="";await loadChapterEnrichment(book,rows);setMessage("");renderVerses()}catch(e){setError(e);setMessage("")}finally{setLoading(false);updateNavigationButtons()}}
async function loadChapterEnrichment(book,rows){const refs=rows.map(r=>r.VerseRef).filter(Boolean);try{const b=await apiGet("bible_books",{select:"Book_Name,Author_Name,Author_Audience,Author_Purpose,Authorship_Time,Literary_Genre,Section,Subsection,Key_Themes,Key_Doctrines,Key_Events,Key_Verses,Jesus_In_This_Book,Chapter_Outline_Summary,Summary_Symbolic_Imagery",Book_Name:"eq."+book.Book_Name,limit:"1"});state.currentBookInfo=b[0]||book;els.bookInfo.disabled=false}catch(e){state.currentBookInfo=book;els.bookInfo.disabled=false}try{if(refs.length){const m=await apiGet("bible_verses",{select:"VerseRef,title,labels,Literary_Genre,TypeGroup,GodIsAttr,ContainsLogicProposition,RankVerse,Section,Subsection,TSKmain",VerseRef:postgrestTextIn(refs)});m.forEach(r=>state.currentVerseMetaMap.set(r.VerseRef,r))}}catch(e){console.warn("Verse metadata enrichment failed",e)}try{await loadCharacterMatches(rows)}catch(e){console.warn("Character enrichment failed",e);state.currentCharacterMatches=[];els.characters.disabled=false}try{await loadLocationMatches(book,rows)}catch(e){console.warn("Location enrichment failed",e);state.currentLocationMatches=[];els.locations.disabled=false}}
function normalizeCharacterText(v){return (" "+String(v||"").toLowerCase().replace(/[^a-z0-9]+/g," ")+" ").replace(/\s+/g," ")}function countWholePhrase(text,phrase){const h=normalizeCharacterText(text),n=normalizeCharacterText(phrase).trim();return n?h.split(" "+n+" ").length-1:0}
function normalizeLocationText(v){return normalizeCharacterText(v)}
function locationAliases(name){const n=normalizeLocationText(name).trim();const aliases=[n];const map={"sea of galilee":["galilee"],"mount sinai":["sinai"],"jerusalem":["zion"],"capernaum":["capharnaum"]};if(map[n])map[n].forEach(a=>aliases.push(a));return Array.from(new Set(aliases.filter(a=>a&&a.length>=3)))}
function parseGeometryPoint(geometry){const text=String(geometry||"");const nums=text.match(/-?[0-9]+(?:[.][0-9]+)?/g)||[];if(nums.length<2)return null;let kind="unknown";if(text.toLowerCase().indexOf("point")!==-1)kind="WKT POINT";else if(text.toLowerCase().indexOf("coordinates")!==-1)kind=text.indexOf("<")!==-1?"KML":"GeoJSON";return{lon:Number(nums[0]),lat:Number(nums[1]),kind:kind}}
function renderMiniMap(locations){const points=locations.map(l=>l.point).filter(Boolean);if(!points.length)return detailCard("Map","No parseable point geometry found for matched locations.",true);const minLon=Math.min.apply(null,points.map(p=>p.lon)),maxLon=Math.max.apply(null,points.map(p=>p.lon)),minLat=Math.min.apply(null,points.map(p=>p.lat)),maxLat=Math.max.apply(null,points.map(p=>p.lat));function x(lon){return 30+((lon-minLon)/((maxLon-minLon)||1))*740}function y(lat){return 320-((lat-minLat)/((maxLat-minLat)||1))*260}const dots=locations.filter(l=>l.point).map(l=>'<circle cx="'+x(l.point.lon).toFixed(1)+'" cy="'+y(l.point.lat).toFixed(1)+'" r="6"><title>'+escapeHtml(l.Name)+'</title></circle><text x="'+(x(l.point.lon)+9).toFixed(1)+'" y="'+(y(l.point.lat)+4).toFixed(1)+'">'+escapeHtml(l.Name)+'</text>').join("");return '<div class="detail-card full"><h4>Map Preview</h4><svg viewBox="0 0 800 360" style="width:100%;height:auto;border:1px solid var(--border);border-radius:14px;background:var(--verse-bg)"><rect x="0" y="0" width="800" height="360" fill="transparent"></rect><g fill="var(--secondary)">'+dots+'</g></svg><p class="meta">Point preview only. Rendering depends on parseable WKT, GeoJSON, or KML coordinates.</p></div>'}
async function loadLocationMatches(book,rows){if(!state.allLocations){state.allLocations=await apiGet("bible_locations_geopandas",{select:"pk,Name,description,geometry",order:"Name.asc",limit:"2000"})}const chapterText=rows.map(r=>(r.VerseRef||"")+" "+(r.Passage||"")).join(" ")+" "+[book.Book_Name,book.Section,book.Subsection].filter(Boolean).join(" ");const normalized=normalizeLocationText(chapterText);state.currentLocationMatches=state.allLocations.map(loc=>{const aliases=locationAliases(loc.Name);let count=0;aliases.forEach(a=>count+=countWholePhrase(normalized,a));if(!count)return null;const refs=rows.filter(r=>aliases.some(a=>countWholePhrase(r.Passage||"",a)>0)).map(r=>r.VerseRef);return Object.assign({},loc,{mentionCount:count,chapterRefs:refs,point:parseGeometryPoint(loc.geometry)})}).filter(Boolean).sort((a,b)=>b.mentionCount-a.mentionCount).slice(0,30);els.locations.disabled=false}async function loadCharacterMatches(rows){const chapterText=rows.map(r=>(r.VerseRef||"")+" "+(r.Passage||"")).join(" ");const candidates=await apiGet("bible_characters",{select:"pk,name,name_modern,name_hebrew,name_greek,name_meaning,testament,major_role_in_bible,overview_statement,summary,key_verses,primary_scripture_refs,character_main_events,key_events,scripture_mentions",order:"name.asc",limit:"500"});const normalized=normalizeCharacterText(chapterText);const seen=new Set();state.currentCharacterMatches=candidates.map(c=>{const names=[c.name,c.name_modern].filter(Boolean).map(n=>normalizeCharacterText(n).trim()).filter(n=>n.length>=3);let count=0;names.forEach(n=>count+=countWholePhrase(normalized,n));if(!count||seen.has(c.pk))return null;seen.add(c.pk);const chapterRefs=rows.filter(r=>names.some(n=>countWholePhrase(r.Passage||"",n)>0)).map(r=>r.VerseRef);return Object.assign({},c,{mentionCount:count,chapterRefs})}).filter(Boolean).sort((a,b)=>b.mentionCount-a.mentionCount).slice(0,30);els.characters.disabled=false}
function updateNavigationButtons(){const book=selectedBook();const chapter=Number(els.chapter.value||0);const i=state.books.findIndex(b=>String(b.Book_Number)===String(els.book.value));els.prev.disabled=i<=0&&chapter<=1;if(!book){els.next.disabled=true;return}const max=Number(book.Chapter_Count||0);els.next.disabled=i>=state.books.length-1&&chapter>=max}async function moveChapter(delta){const current=Number(els.chapter.value||1);const i=state.books.findIndex(b=>String(b.Book_Number)===String(els.book.value));if(i===-1)return;const book=state.books[i];const max=Number(book.Chapter_Count||1);let targetIndex=i,targetChapter=current+delta;if(delta<0&&current<=1){if(i<=0)return;targetIndex=i-1;targetChapter=Number(state.books[targetIndex].Chapter_Count||1)}else if(delta>0&&current>=max){if(i>=state.books.length-1)return;targetIndex=i+1;targetChapter=1}else{targetChapter=Math.min(Math.max(targetChapter,1),max)}els.book.value=String(state.books[targetIndex].Book_Number);rebuildChapterSelect();els.chapter.value=String(targetChapter);updateNavigationButtons();await loadChapter()}function rerenderCurrentXrefs(){if(!state.currentXrefs.length)return;renderXrefFilterChips(state.currentXrefs);els.xrefContent.innerHTML=renderXrefs(filteredCurrentXrefs(),state.currentXrefPassageMap,state.currentXrefPassageMap.size>0)}
function runSelfTests(){try{console.assert(escapeRegExp("Genesis 1:1?")==="Genesis 1:1\\?","escapeRegExp handles question mark");console.assert(escapeHtml("<tag>&'")==="&lt;tag&gt;&amp;&#039;","escapeHtml escapes HTML");console.assert(decodeEscapedUnicode("\\u05d1\\u05e8\\u05d0")==="ברא","unicode decode");console.assert(bookChapterFromRef("Genesis 1:3")==="Genesis 1","bookChapterFromRef");console.assert(isSameBookChapter("Genesis 1:1","Genesis 1:31")===true,"same chapter");console.assert(Number(.123456).toFixed(3)==="0.123","weight round");console.assert(Number(.987654).toFixed(4)==="0.9877","RankVerse round");console.assert(topWeightedXrefsBeforeSort("Genesis 1:1",Array.from({length:45},(_,i)=>({target_VerseRef:"Psalm "+(i+1)+":1",weight:1-i/100}))).length===TOP_XREF_LIMIT,"top 40");console.assert(countWholePhrase("Jesus said unto Moses","Jesus")===1,"Jesus match");console.assert(countWholePhrase("Jesus said unto Moses","Moses")===1,"Moses match");console.assert(parseGeometryPoint("POINT(35.2 31.7)").lat===31.7,"location WKT point parse")}catch(e){console.error("Self-test failure",e)}}
els.book.addEventListener("change",()=>{rebuildChapterSelect();updateNavigationButtons()});els.chapter.addEventListener("change",updateNavigationButtons);els.load.addEventListener("click",loadChapter);els.prev.addEventListener("click",()=>moveChapter(-1));els.next.addEventListener("click",()=>moveChapter(1));els.search.addEventListener("input",renderVerses);els.clearSearch.addEventListener("click",()=>{els.search.value="";renderVerses();els.search.focus()});els.passage.addEventListener("click",e=>{const xb=e.target.closest("[data-xref-ref]");if(xb){openXrefModal(xb.dataset.xrefRef);return}const vb=e.target.closest("[data-verse-detail-ref]");if(vb)openVerseDetailModal(vb.dataset.verseDetailRef)});els.xrefClose.addEventListener("click",closeXrefModal);els.infoClose.addEventListener("click",closeInfoModal);els.bookInfo.addEventListener("click",openBookInfoModal);els.characters.addEventListener("click",openCharactersModal);els.locations.addEventListener("click",openLocationsModal);els.themeToggle.addEventListener("click",toggleTheme);els.xrefSort.addEventListener("change",()=>{state.xrefSortMode=els.xrefSort.value;rerenderCurrentXrefs()});els.xrefSortDirection.addEventListener("change",()=>{state.xrefSortDirection=els.xrefSortDirection.value;rerenderCurrentXrefs()});els.xrefModal.addEventListener("click",e=>{const b=e.target.closest("[data-xref-filter-field]");if(b){const field=b.dataset.xrefFilterField,value=b.dataset.xrefFilterValue;state.currentXrefFilter=field?{field,value}:{field:null,value:null};rerenderCurrentXrefs();return}if(e.target===els.xrefModal)closeXrefModal()});els.infoModal.addEventListener("click",e=>{if(e.target===els.infoModal)closeInfoModal()});document.addEventListener("keydown",e=>{if(e.target.matches("input, select, textarea"))return;if(e.key==="ArrowLeft"&&!els.prev.disabled)moveChapter(-1);if(e.key==="ArrowRight"&&!els.next.disabled)moveChapter(1);if(e.key==="Escape"&&!els.xrefModal.hidden)closeXrefModal();if(e.key==="Escape"&&!els.infoModal.hidden)closeInfoModal()});
runSelfTests();initializeTheme();loadInitialData();
</script>
