<!doctype html>
<html lang="en">

<title>Bible Reader</title>
<style>
:root{--b50:#e8eafd;--b100:#d1d5fa;--b500:#172fe8;--b600:#1226ba;--b700:#0e1c8b;--blue:#0b9bf4;--ink:#020821;--muted:#535979;--bg:var(--b50);--panel:#fff;--text:var(--ink);--border:var(--b100);--input:#fff;--verse:#f0f1f5;--shadow:0 10px 30px #0208211f}

*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.55 system-ui,-apple-system,Segoe UI,sans-serif}header{text-align:center;padding:28px 18px 18px}.logo{width:72px;height:72px;object-fit:contain}h1{margin:4px 0;font-size:clamp(1.8rem,4vw,3rem);letter-spacing:-.04em}p{margin:.35rem 0}.muted,.meta{color:var(--muted)}main{width:min(1100px,calc(100% - 32px));margin:0 auto 40px}.toolbar,.card,.modal{background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow)}.toolbar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;border-radius:22px;padding:18px;position:sticky;top:12px;z-index:5}.card{margin-top:18px;border-radius:24px;overflow:hidden}.head{display:flex;gap:16px;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--panel),var(--bg))}.nav,.tools{display:flex;gap:10px;flex-wrap:wrap}label{display:block;font-size:.82rem;font-weight:700;color:var(--muted);margin:0 0 6px}select,input,button{min-height:42px;border-radius:12px;border:1px solid var(--border);background:var(--input);color:var(--text);font:inherit;padding:9px 11px;width:100%}button{border:0;background:var(--b500);color:#fff;font-weight:800;cursor:pointer;box-shadow:0 6px 18px #172fe82e}button:hover:not(:disabled){background:var(--b700)}button:disabled,input:disabled,select:disabled{opacity:.55;cursor:not-allowed}.theme,.pill{width:auto;border-radius:999px}.theme{background:var(--blue);margin-top:12px}.pill{min-height:30px;padding:5px 11px;background:var(--b50);color:var(--b700);border:1px solid var(--border);box-shadow:none;font-size:.78rem}.dark .pill{background:#50b7f724;color:#c5e7fc}.search{display:grid;grid-template-columns:1fr 150px;gap:10px;margin-top:14px}.status{padding:20px;text-align:center;color:var(--muted)}.error{margin:16px 20px;padding:14px;border:1px solid #df29203d;background:#df292014;color:#861913;border-radius:14px;white-space:pre-wrap}.dark .error{color:#f9d4d2}.passage{padding:12px 20px 24px}.verse{display:grid;grid-template-columns:auto auto 1fr;gap:10px;padding:10px 12px;border-radius:14px}.verse:hover{background:var(--verse)}.vnum{min-width:2.4em;text-align:right}.vnum button,.xref{width:auto;min-height:24px;padding:2px 9px;border-radius:999px;background:transparent;color:var(--b700);box-shadow:none}.dark .vnum button,.dark .xref{color:#c5e7fc}.xref{background:var(--b50);border:1px solid var(--border);font-size:.72rem}.dark .xref{background:#50b7f72e}.vtext{font-size:clamp(1.02rem,2vw,1.18rem)}mark{background:#0b9bf438;border-radius:4px}.backdrop{position:fixed;inset:0;display:grid;place-items:center;background:#01030d9e;z-index:30;padding:18px}.backdrop[hidden]{display:none}.modal{width:min(900px,100%);max-height:min(820px,calc(100vh - 36px));overflow:auto;border-radius:24px}.mhead{display:flex;justify-content:space-between;gap:16px;padding:20px;border-bottom:1px solid var(--border)}.mhead h3{margin:0}.close{width:46px;background:var(--blue);font-size:1.4rem}.grid,.list{padding:14px 20px 22px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.item,.detail{border:1px solid var(--border);border-radius:16px;padding:14px;margin-top:10px;background:var(--panel)}.detail{margin-top:0}.full{grid-column:1/-1}.detail h4{margin:0 0 6px;color:var(--b700)}.dark .detail h4,.dark .ref{color:#a2acf6}.topline{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:.86rem;font-weight:800}.chips,.tags{display:flex;flex-wrap:wrap;gap:8px}.chips{padding:0 20px 12px}.tag.active{background:var(--b500);color:#fff}@media(max-width:800px){.toolbar{position:static;grid-template-columns:1fr 1fr}.head{align-items:stretch;flex-direction:column}.grid{grid-template-columns:1fr}}@media(max-width:520px){main{width:calc(100% - 20px)}.toolbar,.search{grid-template-columns:1fr}.verse{grid-template-columns:auto auto 1fr}}
</style>
</head>
<body>
<header>
  <img id="logo" class="logo" src="https://couppaqsopgvtakzcvgu.supabase.co/storage/v1/object/public/images/heart_only-2_512_fullcolor.png" alt="BT3 logo" />
  <h1>Bible Reader</h1>
  <p class="muted">Select a translation, book, and chapter. Click verse numbers for metadata.</p>
  <button id="theme" class="theme" type="button">🌙 Dark Mode</button>
</header>
<main>
  <section class="toolbar">
    <div><label>Version</label><select id="version"></select></div>
    <div><label>Book</label><select id="book"></select></div>
    <div><label>Chapter</label><select id="chapter"></select></div>
    <div><label>&nbsp;</label><button id="read">Read Chapter</button></div>
  </section>
  <div class="search"><input id="search" type="search" placeholder="Filter verses..." disabled /><button id="clear" disabled>Clear</button></div>
  <p id="meta" class="meta"></p>
  <section class="card">
    <div class="head">
      <div><h2 id="title">Choose a chapter</h2><p id="subtitle" class="muted">Reader ready</p></div>
      <div class="nav"><button id="prev" disabled>Previous</button><button id="next" disabled>Next</button></div>
      <div class="tools"><button id="bookInfo" class="pill" disabled>Book Info</button><button id="chars" class="pill" disabled>Characters</button><button id="locs" class="pill" disabled>Locations</button></div>
    </div>
    <div id="msg" class="status">Load a chapter to begin.</div>
    <div id="err" class="error" hidden></div>
    <article id="passage" class="passage"></article>
  </section>
</main>
<div id="xrefModal" class="backdrop" hidden><section class="modal"><div class="mhead"><div><h3 id="xrefTitle">Cross references</h3><p id="xrefSub" class="muted">Top 40 weighted references</p></div><button id="xrefClose" class="close">×</button></div><div class="search" style="padding:0 20px 20px;margin-top:0"><select id="xrefSort"><option value="weight">Sort by Weight</option><option value="RankVerse">Sort by RankVerse</option></select><select id="xrefDir"><option value="desc">Descending</option><option value="asc">Ascending</option></select></div><div id="xrefChips" class="chips"></div><div id="xrefBody" class="list"></div></section></div>
<div id="infoModal" class="backdrop" hidden><section class="modal"><div class="mhead"><div><h3 id="infoTitle">Details</h3><p id="infoSub" class="muted"></p></div><button id="infoClose" class="close">×</button></div><div id="infoBody" class="grid"></div></section></div>
<script>
const CFG={url:"https://couppaqsopgvtakzcvgu.supabase.co",key:"sb_publishable_BXhuuJDrxb1saVjzaYYnLg_-RfCdtjF",topXrefs:40,themeKey:"bible-reader-theme",lightLogo:"https://couppaqsopgvtakzcvgu.supabase.co/storage/v1/object/public/images/heart_only-2_512_fullcolor.png",darkLogo:"https://couppaqsopgvtakzcvgu.supabase.co/storage/v1/object/public/images/heartlogo_only_darkmode_512.png"};
const API=CFG.url.replace(/\/$/,"")+"/rest/v1";
const $=id=>document.getElementById(id);
const el={version:$("version"),book:$("book"),chapter:$("chapter"),read:$("read"),prev:$("prev"),next:$("next"),title:$("title"),subtitle:$("subtitle"),msg:$("msg"),err:$("err"),passage:$("passage"),search:$("search"),clear:$("clear"),meta:$("meta"),theme:$("theme"),logo:$("logo"),bookInfo:$("bookInfo"),chars:$("chars"),locs:$("locs"),xrefModal:$("xrefModal"),xrefTitle:$("xrefTitle"),xrefSub:$("xrefSub"),xrefBody:$("xrefBody"),xrefChips:$("xrefChips"),xrefClose:$("xrefClose"),xrefSort:$("xrefSort"),xrefDir:$("xrefDir"),infoModal:$("infoModal"),infoTitle:$("infoTitle"),infoSub:$("infoSub"),infoBody:$("infoBody"),infoClose:$("infoClose")};
const state={versions:[],books:[],verses:[],bookInfo:null,verseMeta:new Map(),chars:[],locs:[],allLocs:null,xrefs:[],xrefPassages:new Map(),xrefFilter:null,xrefSort:"weight",xrefDir:"desc"};
const esc=v=>String(decodeUnicode(v??"")).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
function decodeUnicode(v){const s=String(v);const out=s.replace(/\\u([0-9a-fA-F]{4})/g,(_,h)=>String.fromCharCode(parseInt(h,16)));return /[\u0590-\u05ff\u0370-\u03ff]/.test(out)?out.replace(/\\/g,"").split(" ").filter(Boolean).join(" "):out}
const norm=v=>(" "+String(v||"").toLowerCase().replace(/[^a-z0-9]+/g," ")+" ").replace(/\s+/g," ");
const phraseCount=(text,phrase)=>{const n=norm(phrase).trim();return n?norm(text).split(" "+n+" ").length-1:0};
const inList=vals=>'in.('+[...new Set(vals.filter(Boolean).map(String))].map(v=>'"'+v.replace(/"/g,'\\"')+'"').join(',')+')';
function msg(t){el.msg.hidden=!t;el.msg.textContent=t||""} function error(e){el.err.hidden=!e;el.err.textContent=e?String(e.message||e):""}
function disableMain(on){[el.version,el.book,el.chapter,el.read,el.prev,el.next,el.search,el.clear].forEach(x=>x.disabled=on)}
async function api(table,params={},attempt=0){const u=new URL(API+"/"+table);Object.entries(params).forEach(([k,v])=>v!==undefined&&v!==null&&v!==""&&u.searchParams.set(k,v));try{const c=new AbortController();const timer=setTimeout(()=>c.abort(),15000);const r=await fetch(u,{headers:{apikey:CFG.key,Authorization:"Bearer "+CFG.key,Accept:"application/json"},signal:c.signal});clearTimeout(timer);const text=await r.text();if(!r.ok){const m=r.status+" "+r.statusText+": "+text.slice(0,600);if((r.status>=500||/timeout|57014/i.test(m))&&attempt<1){await wait(700);return api(table,params,1)}throw Error(m)}try{return text?JSON.parse(text):[]}catch{if(attempt<1){await wait(700);return api(table,params,1)}throw Error("Expected JSON from "+table+" but received: "+text.slice(0,300).replace(/\s+/g," "))}}catch(e){if((e.name==="AbortError"||/timeout|network|57014/i.test(String(e.message||e)))&&attempt<1){await wait(700);return api(table,params,1)}throw e}}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function options(select,rows,value,label){select.innerHTML="";rows.forEach(r=>select.add(new Option(label(r),value(r))))}
const version=()=>state.versions.find(v=>String(v.pk)===String(el.version.value));
const book=()=>state.books.find(b=>String(b.Book_Number)===String(el.book.value));
function updateChapters(){const b=book();options(el.chapter,Array.from({length:Number(b?.Chapter_Count||0)},(_,i)=>i+1),n=>n,n=>"Chapter "+n)}
function navState(){const b=book(),c=Number(el.chapter.value||0),i=state.books.findIndex(x=>String(x.Book_Number)===String(el.book.value));el.prev.disabled=i<=0&&c<=1;el.next.disabled=!b||(i>=state.books.length-1&&c>=Number(b.Chapter_Count||0))}
async function init(){setTheme(localStorage.getItem(CFG.themeKey)||((matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light"));disableMain(true);msg("Loading versions and books...");try{const [versions,books]=await Promise.all([api("bible_versions",{select:"pk,abbreviation,full_name,language",order:"abbreviation.asc"}),api("bible_books",{select:"Book_Number,Book_Name,Chapter_Count,Section,Subsection",order:"Book_Number.asc"})]);state.versions=versions;state.books=books;options(el.version,versions,v=>v.pk,v=>(v.abbreviation||"Version")+(v.full_name?" — "+v.full_name:""));options(el.book,books,b=>b.Book_Number,b=>b.Book_Name);updateChapters();msg("Choose a chapter and press Read Chapter.")}catch(e){error(e);msg("")}finally{disableMain(false);navState()}}
function setTheme(t){const dark=t==="dark";document.body.classList.toggle("dark",dark);el.theme.textContent=dark?"☀️ Light Mode":"🌙 Dark Mode";el.logo.src=dark?CFG.darkLogo:CFG.lightLogo;localStorage.setItem(CFG.themeKey,dark?"dark":"light")}
function verseNum(ref){return (String(ref).match(/:(\d+)(?:-|$)/)||[])[1]||""}
function chapterKey(ref){const p=String(ref||"").split(":")[0]||"";const i=p.lastIndexOf(" ");return i<0?"":(!isNaN(Number(p.slice(i+1)))?p:"")}
function sameChapter(a,b){return chapterKey(a)&&chapterKey(a)===chapterKey(b)}
function highlight(text,q){const safe=esc(text),s=String(q||"").trim();return s?safe.replace(new RegExp("("+s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>"):safe}
async function readChapter(){const v=version(),b=book(),c=Number(el.chapter.value);if(!v||!b||!c)return;error(null);msg("Loading chapter...");disableMain(true);Object.assign(state,{verses:[],bookInfo:null,chars:[],locs:[]});state.verseMeta=new Map();el.bookInfo.disabled=el.chars.disabled=el.locs.disabled=true;el.passage.innerHTML="";try{let rows=await api("bible_passages",{select:"VerseRef,Passage,RowNum",bible_version_FK:"eq."+v.pk,VerseRef:"like."+b.Book_Name+" "+c+":%",order:"RowNum.asc"});if(!rows.length)rows=await rowsByMetadata(v,b,c);if(!rows.length)throw Error("No verses found for "+b.Book_Name+" "+c+" in "+v.abbreviation+".");state.verses=rows;el.title.textContent=b.Book_Name+" "+c;el.subtitle.textContent=(v.abbreviation||"Version")+(v.full_name?" — "+v.full_name:"");el.search.disabled=el.clear.disabled=false;el.search.value="";await enrich(b,rows);renderVerses();msg("")}catch(e){error(e);msg("")}finally{disableMain(false);navState()}}
async function rowsByMetadata(v,b,c){const meta=await api("bible_verses",{select:"VerseRef,RowNum",Book_Name:"eq."+b.Book_Name,Chapter:"eq."+c,order:"RowNum.asc"});if(!meta.length)return[];const nums=meta.map(r=>Number(r.RowNum)).filter(Number.isFinite),min=Math.min(...nums),max=Math.max(...nums);const rows=await api("bible_passages",{select:"VerseRef,Passage,RowNum",bible_version_FK:"eq."+v.pk,RowNum:"gte."+min,order:"RowNum.asc"});return rows.filter(r=>Number(r.RowNum)<=max)}
async function enrich(b,rows){await Promise.allSettled([loadBookInfo(b),loadVerseMeta(rows),loadCharacters(rows),loadLocations(b,rows)]);el.bookInfo.disabled=false;el.chars.disabled=false;el.locs.disabled=false}
async function loadBookInfo(b){const r=await api("bible_books",{select:"Book_Name,Author_Name,Author_Audience,Author_Purpose,Authorship_Time,Literary_Genre,Section,Subsection,Key_Themes,Key_Doctrines,Key_Events,Key_Verses,Jesus_In_This_Book,Chapter_Outline_Summary,Summary_Symbolic_Imagery",Book_Name:"eq."+b.Book_Name,limit:"1"});state.bookInfo=r[0]||b}
async function loadVerseMeta(rows){const refs=rows.map(r=>r.VerseRef).filter(Boolean);if(!refs.length)return;const meta=await api("bible_verses",{select:"VerseRef,title,labels,Literary_Genre,TypeGroup,GodIsAttr,ContainsLogicProposition,RankVerse,Section,Subsection,TSKmain",VerseRef:inList(refs)});meta.forEach(r=>state.verseMeta.set(r.VerseRef,r))}
async function loadCharacters(rows){const text=rows.map(r=>(r.VerseRef||"")+" "+(r.Passage||"")).join(" ");const people=await api("bible_characters",{select:"pk,name,name_modern,name_hebrew,name_greek,name_meaning,testament,major_role_in_bible,overview_statement,summary,key_verses,primary_scripture_refs,character_main_events,key_events",order:"name.asc",limit:"500"});state.chars=rankMatches(people,text,rows,p=>[p.name,p.name_modern]).slice(0,30)}
async function loadLocations(b,rows){if(!state.allLocs)state.allLocs=await api("bible_locations_geopandas",{select:"pk,Name,description,geometry",order:"Name.asc",limit:"2000"});const text=rows.map(r=>(r.VerseRef||"")+" "+(r.Passage||"")).join(" ")+" "+[b.Book_Name,b.Section,b.Subsection].filter(Boolean).join(" ");state.locs=rankMatches(state.allLocs,text,rows,l=>locAliases(l.Name)).map(l=>({...l,point:point(l.geometry)})).slice(0,30)}
function rankMatches(items,text,rows,getNames){const seen=new Set();return items.map(x=>{const names=[...new Set(getNames(x).filter(Boolean).flatMap(aliasList).map(a=>norm(a).trim()).filter(a=>a.length>=3&&!['the','and'].includes(a)))];const count=names.reduce((n,a)=>n+phraseCount(text,a),0);if(!count||seen.has(x.pk))return null;seen.add(x.pk);return{...x,mentionCount:count,chapterRefs:rows.filter(r=>names.some(a=>phraseCount(r.Passage||"",a))).map(r=>r.VerseRef),matchedAliases:names}}).filter(Boolean).sort((a,b)=>b.mentionCount-a.mentionCount||String(a.Name||a.name||"").localeCompare(String(b.Name||b.name||"")))}
function aliasList(name){return [name]}
function locAliases(name){const raw=String(name||""),base=raw.replace(/\([^)]*\)/g," ");const n=norm(raw).trim(),b=norm(base).trim();const map={"sea of galilee":["galilee"],"mount sinai":["sinai"],"jerusalem":["zion"],"capernaum":["capharnaum"],"nineveh":["nineve","ninive","niniveh"],"joppa":["joppe"],"tyre":["tyrus"],"sidon":["zidon"]};return [n,b,...(map[n]||[]),...(map[b]||[]),...(b.includes(" ")?[b.split(" ")[0]]:[])]}
function point(g){const nums=String(g||"").match(/-?\d+(?:\.\d+)?/g)||[];if(nums.length<2)return null;const s=String(g).toLowerCase();return{lon:Number(nums[0]),lat:Number(nums[1]),kind:s.includes("point")?"WKT POINT":s.includes("coordinates")?(String(g).includes("<")?"KML":"GeoJSON"):"unknown"}}
function renderVerses(){const q=el.search.value.trim(),rows=q?state.verses.filter(r=>String(r.Passage||"").toLowerCase().includes(q.toLowerCase())):state.verses;el.passage.innerHTML=rows.map(r=>`<div class="verse"><div><button class="xref" data-xref="${esc(r.VerseRef)}">Xrefs</button></div><div class="vnum"><button data-vmeta="${esc(r.VerseRef)}">${esc(verseNum(r.VerseRef))}</button></div><div class="vtext">${highlight(r.Passage,q)}</div></div>`).join("");el.meta.textContent=q?`${rows.length} of ${state.verses.length} verses shown.`:`${state.verses.length} verses loaded.`}
function card(title,value,full=false){return `<div class="detail${full?' full':''}"><h4>${esc(title)}</h4><p>${value?esc(value):'—'}</p></div>`}
function openInfo(title,sub,html){el.infoTitle.textContent=title;el.infoSub.textContent=sub||"";el.infoBody.innerHTML=html;el.infoModal.hidden=false}
function showBook(){const b=state.bookInfo||book();openInfo("Book Info",b.Book_Name,[['Author',b.Author_Name],['Audience',b.Author_Audience],['Purpose',b.Author_Purpose,1],['Authorship Time',b.Authorship_Time],['Genre',b.Literary_Genre],['Section',b.Section],['Subsection',b.Subsection],['Key Themes',b.Key_Themes,1],['Key Doctrines',b.Key_Doctrines,1],['Key Events',b.Key_Events,1],['Key Verses',b.Key_Verses,1],['Jesus In This Book',b.Jesus_In_This_Book,1],['Chapter Outline',b.Chapter_Outline_Summary,1]].map(x=>card(x[0],x[1],x[2])).join(""))}
async function showVerse(ref){let m=state.verseMeta.get(ref);if(!m){const r=await api("bible_verses",{select:"VerseRef,title,labels,Literary_Genre,TypeGroup,GodIsAttr,ContainsLogicProposition,RankVerse,Section,Subsection,TSKmain",VerseRef:"eq."+ref,limit:"1"});m=r[0]}openInfo("Verse Details",ref,m?[['Title',m.title],['Labels',m.labels,1],['Literary Genre',m.Literary_Genre],['Type Group',m.TypeGroup],['God Is',m.GodIsAttr,1],['Logic Proposition',m.ContainsLogicProposition],['RankVerse',m.RankVerse==null?'':Number(m.RankVerse).toFixed(4)],['Section',m.Section],['Subsection',m.Subsection],['TSK',m.TSKmain,1]].map(x=>card(x[0],x[1],x[2])).join(""):card("Status","No metadata found.",1))}
function showCharacters(){openInfo("Characters",el.title.textContent,state.chars.length?state.chars.map(c=>`<div class="detail full"><h4>${esc(c.name_modern||c.name||'Unknown')}</h4><p class="muted">${esc([c.name_hebrew,c.name_greek,c.testament].filter(Boolean).join(' • '))}</p><p><b>Mentions:</b> ${c.mentionCount}</p><p><b>Refs:</b> ${esc(c.chapterRefs.slice(0,10).join(', ')||'—')}</p><p><b>Meaning:</b> ${esc(c.name_meaning||'—')}</p><p><b>Role:</b> ${esc(c.major_role_in_bible||'—')}</p><p><b>Overview:</b> ${esc(c.overview_statement||c.summary||'—')}</p></div>`).join(""):card("Status","No character matches found for this chapter.",1))}
function showLocations(){openInfo("Locations",el.title.textContent,state.locs.length?miniMap(state.locs)+state.locs.map(l=>`<div class="detail full"><h4>${esc(l.Name||'Unknown')}</h4><p><b>Mentions:</b> ${l.mentionCount}</p><p><b>Refs:</b> ${esc(l.chapterRefs.slice(0,10).join(', ')||'—')}</p><p><b>Geometry:</b> ${esc(l.point?`${l.point.kind} lon=${l.point.lon}, lat=${l.point.lat}`:String(l.geometry||'').slice(0,180)||'—')}</p><p><b>Description:</b> ${esc(l.description||'—')}</p></div>`).join(""):card("Status","No location matches found for this chapter.",1))}
function miniMap(locs){const pts=locs.filter(l=>l.point);if(!pts.length)return card("Map","No parseable point geometry found.",1);const xs=pts.map(l=>l.point.lon),ys=pts.map(l=>l.point.lat),minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);const x=n=>30+((n-minX)/((maxX-minX)||1))*740,y=n=>320-((n-minY)/((maxY-minY)||1))*260;return `<div class="detail full"><h4>Map Preview</h4><svg viewBox="0 0 800 360" style="width:100%;border:1px solid var(--border);border-radius:14px;background:var(--verse)">${pts.map(l=>`<circle cx="${x(l.point.lon)}" cy="${y(l.point.lat)}" r="6" fill="var(--blue)"><title>${esc(l.Name)}</title></circle><text x="${x(l.point.lon)+9}" y="${y(l.point.lat)+4}" fill="var(--text)">${esc(l.Name)}</text>`).join('')}</svg></div>`}
async function showXrefs(ref){el.xrefModal.hidden=false;el.xrefTitle.textContent=ref+" cross references";el.xrefSub.textContent="Loading top weighted references...";el.xrefBody.innerHTML='<div class="status">Loading...</div>';el.xrefChips.innerHTML="";try{const raw=await loadXrefs(ref),meta=await xrefMeta(raw);state.xrefs=sortXrefs(raw.map(r=>({...r,...(meta.get(r.target_VerseRef)||{})})).filter(r=>!sameChapter(ref,r.target_VerseRef)).sort((a,b)=>Number(b.weight||0)-Number(a.weight||0)).slice(0,CFG.topXrefs));state.xrefFilter=null;state.xrefPassages=new Map();renderXrefs();const pm=await xrefPassages(state.xrefs);state.xrefPassages=pm;renderXrefs(true)}catch(e){el.xrefBody.innerHTML='<div class="error">'+esc(e.message||e)+'</div>'}}
async function loadXrefs(ref){for(const limit of [250,100,50,20]){try{return await api("bible_xrefs",{select:"target_VerseRef,terms,weight,connectid",source_VerseRef:"eq."+ref,limit})}catch(e){if(!/timeout|57014/i.test(String(e.message||e)))throw e}}return[]}
async function xrefMeta(rows){const refs=rows.map(r=>r.target_VerseRef).filter(Boolean),m=new Map();if(!refs.length)return m;(await api("bible_verses",{select:"VerseRef,RowNum,RankVerse,Section,Subsection",VerseRef:inList(refs)})).forEach(r=>m.set(r.VerseRef,r));return m}
async function xrefPassages(rows){const v=version(),refs=[...new Set(rows.map(r=>r.target_VerseRef).filter(Boolean))],m=new Map();if(!v||!refs.length)return m;for(let i=0;i<refs.length;i+=25)(await api("bible_passages",{select:"VerseRef,Passage",bible_version_FK:"eq."+v.pk,VerseRef:inList(refs.slice(i,i+25))})).forEach(r=>m.set(r.VerseRef,r.Passage));return m}
function sortXrefs(rows){return rows.slice().sort((a,b)=>(Number(a[state.xrefSort]||0)-Number(b[state.xrefSort]||0))*(state.xrefDir==='asc'?1:-1))}
function renderXrefs(withText=false){const rows=state.xrefFilter?state.xrefs.filter(r=>String(r[state.xrefFilter.field]||'').trim()===state.xrefFilter.value):state.xrefs;const vals=f=>[...new Set(state.xrefs.map(r=>r[f]).filter(Boolean).map(v=>String(v).trim()))].sort();el.xrefSub.textContent=`Top ${state.xrefs.length} weighted references outside this chapter`;el.xrefChips.innerHTML=['<button class="pill tag'+(!state.xrefFilter?' active':'')+'" data-filter="">All</button>',...vals('Section').map(v=>chip('Section',v)),...vals('Subsection').map(v=>chip('Subsection',v))].join('');el.xrefBody.innerHTML=sortXrefs(rows).map((r,i)=>`<div class="item"><div class="topline"><span class="ref">${i+1}. ${esc(r.target_VerseRef)}</span><span>${r.weight==null?'':'Weight: '+Number(r.weight).toFixed(3)}${r.RankVerse==null?'':' • RankVerse: '+Number(r.RankVerse).toFixed(4)}</span></div>${withText?'<p>'+esc(state.xrefPassages.get(r.target_VerseRef)||'Passage text not available in this version.')+'</p>':''}<p class="muted">${esc(r.terms||'')}</p></div>`).join('')||'<div class="status">No cross references found.</div>'}
function chip(field,value){const on=state.xrefFilter&&state.xrefFilter.field===field&&state.xrefFilter.value===value;return `<button class="pill tag${on?' active':''}" data-filter="${field}" data-value="${esc(value)}">${field}: ${esc(value)}</button>`}
async function move(delta){const cur=Number(el.chapter.value||1),i=state.books.findIndex(b=>String(b.Book_Number)===String(el.book.value));if(i<0)return;const max=Number(state.books[i].Chapter_Count||1);let bi=i,ch=cur+delta;if(delta<0&&cur<=1){if(i<=0)return;bi=i-1;ch=Number(state.books[bi].Chapter_Count||1)}else if(delta>0&&cur>=max){if(i>=state.books.length-1)return;bi=i+1;ch=1}else ch=Math.min(Math.max(ch,1),max);el.book.value=state.books[bi].Book_Number;updateChapters();el.chapter.value=ch;await readChapter()}
el.book.onchange=()=>{updateChapters();navState()};el.chapter.onchange=navState;el.read.onclick=readChapter;el.prev.onclick=()=>move(-1);el.next.onclick=()=>move(1);el.search.oninput=renderVerses;el.clear.onclick=()=>{el.search.value='';renderVerses();el.search.focus()};el.theme.onclick=()=>setTheme(document.body.classList.contains('dark')?'light':'dark');el.bookInfo.onclick=showBook;el.chars.onclick=showCharacters;el.locs.onclick=showLocations;el.xrefClose.onclick=()=>el.xrefModal.hidden=true;el.infoClose.onclick=()=>el.infoModal.hidden=true;el.passage.onclick=e=>{const x=e.target.closest('[data-xref]'),v=e.target.closest('[data-vmeta]');if(x)showXrefs(x.dataset.xref);if(v)showVerse(v.dataset.vmeta)};el.xrefSort.onchange=()=>{state.xrefSort=el.xrefSort.value;renderXrefs(!!state.xrefPassages.size)};el.xrefDir.onchange=()=>{state.xrefDir=el.xrefDir.value;renderXrefs(!!state.xrefPassages.size)};el.xrefChips.onclick=e=>{const b=e.target.closest('[data-filter]');if(!b)return;state.xrefFilter=b.dataset.filter?{field:b.dataset.filter,value:b.dataset.value}:null;renderXrefs(!!state.xrefPassages.size)};document.onclick=e=>{if(e.target===el.xrefModal)el.xrefModal.hidden=true;if(e.target===el.infoModal)el.infoModal.hidden=true};document.onkeydown=e=>{if(e.target.matches('input,select,textarea'))return;if(e.key==='ArrowLeft'&&!el.prev.disabled)move(-1);if(e.key==='ArrowRight'&&!el.next.disabled)move(1);if(e.key==='Escape'){el.xrefModal.hidden=true;el.infoModal.hidden=true}};
init();
</script>
